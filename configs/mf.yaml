# AMPR Config: Molecular Function (MF) branch

branch: MF
n_terms: 489

data:
  seq_emb: data/embeddings/seq_embeddings.npy
  struct_emb: data/embeddings/struct_embeddings.npy
  ppi_emb: data/embeddings/ppi_embeddings.npy
  labels: data/labels_mf.npy
  dag_matrix: data/dag_matrices/dag_matrix_mf.npy
  go_emb: data/embeddings/go_emb_mf.npy
  splits: data/splits_stratified.json
  protein_order: data/protein_order.json   # row ordering of .npy files

model:
  d_hidden: 512
  dropout_3di: 0.15
  dropout_ppi: 0.25
  classifier: both      # "linear" | "biobert" | "both"
  go_emb_dim: 768       # BioBERT output dimension
  ppi_dim: 256          # DeepGO graph_new_embeddings.pkl: 256-dim

training:
  epochs: 50
  batch_size: 256
  lr: 1.0e-3
  lambda_dag: 0.5
  seed: 42
  device: auto          # "cuda" | "cpu" | "auto"

output:
  checkpoint_dir: checkpoints/mf/
  log_file: logs/mf_train.log
  results_file: results/mf_predictions.tsv
